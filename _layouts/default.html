<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang }}">
<head>
  {% include head.html %}
</head>
<body class="{{ page.body_class | default: "site-page" }}">
  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="{{ "/" | relative_url }}">
        <span class="brand-mark">UA</span>
        <span class="brand-copy">
          <strong>{{ site.title | escape }}</strong>
          <small>{{ site.tagline | escape }}</small>
        </span>
      </a>
      <div class="header-menus">
        {% include menu.html menu=site.navigation class="site-nav" %}
        {% include menu.html menu=site.external class="social-nav" %}
      </div>
    </header>

    <main class="site-main">
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>{{ site.title }} | Portfolio and academic learning journal</p>
    </footer>
  </div>
</body>
</html>
