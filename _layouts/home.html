<html lang="{{ page.lang | default: site.lang }}">

{% include head.html %}

<body>

  {% include header.html %}

  <section id="banner" class="major">
    <div class="inner">
      <header class="major">
        <h1>{{ page.landing-title }}</h1>
      </header>
      <div class="content">
        <p style="text-transform: uppercase;">{{ site.description }}</p>
        <ul class="actions">
          <li><a href="#one" class="button next scrolly">Explore</a></li>
        </ul>
      </div>
    </div>
  </section>

  <div id="main">
    {% include tiles.html %}

    <section id="two">
      <div class="inner">
        <header class="major">
          <h2>Academic Focus and Personal Journey</h2>
        </header>
        {{ content }}
        <ul class="actions">
          <li><a href="{{ '/blog/' | relative_url }}" class="button next">View Blog</a></li>
          <li><a href="{{ '/about/' | relative_url }}" class="button">About Me</a></li>
        </ul>
      </div>
    </section>
  </div>

  {% include footer.html %}

</body>

</html>
