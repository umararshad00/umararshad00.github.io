---
layout: default
---
<article class="content-card">
  <header class="page-heading">
    <p class="eyebrow">{{ page.kicker | default: site.tagline }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}
      <p class="lead">{{ page.subtitle }}</p>
    {% endif %}
  </header>
  <div class="page-content">
    {{ content }}
  </div>
</article>
