---
layout: default
---

<div id="main" class="alt">
  <section id="one">
    <div class="inner">
      <header class="major">
        <h1>{{ page.title }}</h1>
      </header>
      {% if page.subtitle %}
      <p class="meta-intro">{{ page.subtitle }}</p>
      {% endif %}
      {% if page.image %}
      <span class="image main"><img src="{{ page.image | relative_url }}" alt="{{ page.title | escape }}" /></span>
      {% endif %}
      {{ content }}
    </div>
  </section>
</div>
