{% assign tiles = site.html_pages | where_exp: "item", "item.show_tile == true" %}
<section id="one" class="tiles">
  {% for tile in tiles limit: site.tiles-count %}
  <article>
    <span class="image">
      <img src="{{ tile.image | relative_url }}" alt="{{ tile.title | escape }}" />
    </span>
    <header class="major">
      <h3><a href="{{ tile.url | relative_url }}" class="link">{{ tile.title }}</a></h3>
      <p>{{ tile.description }}</p>
    </header>
  </article>
  {% endfor %}
</section>
