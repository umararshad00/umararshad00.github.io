<!-- Wrapper -->
<div id="wrapper">

<!-- Header -->
<header id="header"{% if page.layout == "landing" %} class="alt style2"{% endif %}{% if page.layout == "home" %} class="alt"{% endif %}>
  <a href="{{ "/" | relative_url }}" class="logo"><strong>{{ site.title }}</strong> <span>{{ site.subtitle }}</span></a>
  <nav>
    <a href="#menu">Menu</a>
  </nav>
</header>

<!-- Menu -->
<nav id="menu">
  <ul class="links">
    {% for item in site.navigation %}
      {% assign node = site.pages | where: "name", item.file | first %}
      {% if node %}
      <li><a href="{{ node.url | relative_url }}">{{ item.title | default: node.title }}</a></li>
      {% endif %}
    {% endfor %}
  </ul>
</nav>
